name: Data Pipeline

on:
  push:
    paths:
      - 'data/normalized/**'
      - 'data/matched-draft.json'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - name: Validate sample data
        run: npm run validate-data -- --league sample
